name: checkout-and-merge
description: "checkout OpenCV repositories and merge if needed"

inputs:
  target_branch:
    description: "Target PR branch in OpenCV repository (4.x, 5.x)"
    default: "4.x"
    required: true
  author:
    description: "PR author"
  source_branch:
    description: "Source PR branch"
  home:
    description: "Home directory on executor (for git configuration)"
    default: "/home/ubuntu"
  workdir:
    description: "Work directory on executor, repositories will be cloned to opencv/opencv_contrib/opencv_extra"

runs:
  using: "composite"
  steps:
  - working-directory: ${{ inputs.workdir }}
    shell: bash
    run: |
      echo "::group::Clone opencv"
      HOME=${{ inputs.home }} \
      git clone \
        --reference-if-able ${{ env.GIT_CACHE_DOCKER }}/opencv.git \
        --single-branch \
        --branch ${{ inputs.target_branch }} \
        https://github.com/opencv/opencv.git \
        opencv
      echo "::endgroup::"

  - if: ${{ github.event.repository.name != 'ci-gha-workflow' && inputs.source_branch }}
    working-directory: ${{ inputs.workdir }}
    shell: bash
    run: |
      echo "::group::Merge opencv"
      HOME=${{ inputs.home }} \
      git pull \
        -v \
        -C opencv \
        "https://github.com/${{ inputs.author }}/opencv" \
        "${{ inputs.source_branch }}"
      echo "::endgroup::"

  - working-directory: ${{ inputs.workdir }}
    shell: bash
    run: |
      echo "::group::Clone opencv_extra"
      HOME=${{ inputs.home }} \
      git clone \
        --reference-if-able ${{ env.GIT_CACHE_DOCKER }}/opencv_extra.git \
        --single-branch \
        --branch ${{ inputs.target_branch }} \
        https://github.com/opencv/opencv_extra.git \
        opencv_extra
      echo "::endgroup::"

  - if: ${{ github.event.repository.name != 'ci-gha-workflow' && inputs.source_branch }}
    working-directory: ${{ inputs.workdir }}
    shell: bash
    run: |
      echo "OPENCV_EXTRA_FORK=$(HOME=${{ inputs.home }} git ls-remote --heads "https://github.com/${{ inputs.author }}/opencv_extra)" >> $GITHUB_ENV

  - if: ${{ github.event.repository.name != 'ci-gha-workflow' && inputs.source_branch && env.OPENCV_EXTRA_FORK }}
    shell: bash
    run: |
      echo "::group::Merge opencv_extra"
      HOME=${{ inputs.home }} \
      git pull \
        -v \
        "https://github.com/${{ inputs.author }}/opencv_extra" \
        "${{ inputs.source_branch }}"
      echo "::endgroup::"
